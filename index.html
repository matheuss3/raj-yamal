<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>raj-yamal</title>

    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#eb002f" />
    <link rel="icon" href="/icons/icon-512.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="raj-yamal" />

    <script>
      // Aplica o tema salvo antes do primeiro paint, evitando flash do tema errado.
      // Chave duplicada intencionalmente de src/features/theme/ThemeProvider.tsx
      // (THEME_STORAGE_KEY) — um script inline não pode importar módulos TS.
      (function () {
        try {
          var stored = localStorage.getItem("raj-yamal:theme");
          if (stored === "dark" || stored === "light") {
            document.documentElement.setAttribute("data-theme", stored);
          }
        } catch (e) {
          /* localStorage indisponível (ex: modo privado) — segue com o tema do sistema */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
